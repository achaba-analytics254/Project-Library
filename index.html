<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Project Library</title>
  </head>
  <body>
    <div class="modal-container" id="modalContainer">
      <form method="POST" novalidate>
        <div class="form-header">
          <h4>Library Form</h4>
          <p>Please fill this form to add a new book to the Library</p>
        </div>
        <div class="form-group">
          <label for="bookAuthor"
            >Book Author: <span class="asterik">*</span></label
          >
          <input
            type="text"
            name="bookAuthor"
            id="bookAuthor"
            placeholder="John Doe"
            required
          />
          <div
            class="error-message"
            id="bookAuthor-error"
            aria-live="polite"
          ></div>
        </div>
        <div class="form-group">
          <label for="bookTitle"
            >Book Title: <span class="asterik">*</span></label
          >
          <input
            type="text"
            name="bookTitle"
            id="bookTitle"
            placeholder="Java Fundamentals"
            required
          />
          <div
            class="error-message"
            id="bookTitle-error"
            aria-live="polite"
          ></div>
        </div>
        <div class="form-group">
          <label for="bookPages"
            >Number of Pages: <span class="asterik">*</span></label
          >
          <input
            type="number"
            name="bookPages"
            id="bookPages"
            placeholder="200"
            required
          />
          <div
            class="error-message"
            id="bookPages-error"
            aria-live="polite"
          ></div>
        </div>
        <div class="form-group">
          <label for="bookStatus"
            >Book Status: <span class="asterik">*</span></label
          >
          <select name="bookStatus" id="bookStatus" required>
            <option value="Read">Read</option>
            <option value="Unread" selected>Unread</option>
            <option value="Wish List">Wishlist</option>
          </select>
          <div
            class="error-message"
            id="bookStatus-error"
            aria-live="polite"
          ></div>
        </div>
        <div class="form-btn">
          <button type="submit" class="submit-btn" id="submitBtn">
            Submit
          </button>
          <button type="button" class="cancel-btn" id="cancelBtn">
            Cancel
          </button>
        </div>
      </form>
    </div>
    <div class="container">
      <div class="table-header">
        <div class="right">
          <h2>My Library</h2>
          <img
            src="./images/books.avif"
            alt="Books stacked on top of eache other"
          />
        </div>

        <button class="add-book-btn" id="newBook">Add New Book</button>
      </div>
      <div class="wrapper">
        <table>
          <caption>
            Library
          </caption>
          <thead>
            <tr>
              <th scope="col" id="bookId">Book ID</th>
              <th scope="col" id="bookAuthor">Author</th>
              <th scope="col" id="bookTitle">Book Title</th>
              <th scope="col" id="bookPages">Pages</th>
              <th scope="col" id="bookStatus">Status</th>
              <th scope="col">Action</th>
            </tr>
          </thead>
          <!-- Table body goes here remember rows are in  the main.js -->
          <tbody id="libraryBody"></tbody>
        </table>
      </div>
    </div>
    <script src="main.js" defer></script>
  </body>
</html>
